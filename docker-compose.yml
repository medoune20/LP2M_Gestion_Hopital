services:
  gestionhopital:
    build:
      context: .
      dockerfile: Dockerfile
    image: gestionhopital:latest
    container_name: gestionhopital
    restart: unless-stopped
    ports:
      # Exposition temporaire sur l'hote pour que le Caddy LP2M puisse router /hopital.
      # A terme, cette application pourra rejoindre le meme reseau Docker que les autres apps LP2M.
      - "5050:8080"
    volumes:
      - hopital_data:/data
    environment:
      - DATA_DIR=/data
      - ASPNETCORE_ENVIRONMENT=Production
      # URL publique : https://lp2medoune.com/hopital
      - PATH_BASE=/hopital
      # Email SMTP : valeurs lues depuis .env serveur, comme GestionBar.
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_SSL=${SMTP_SSL:-true}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  hopital_data:
    driver: local
